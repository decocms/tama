<?xml version="1.0" encoding="UTF-8"?>
<!-- Placeholder companion sprite-sheet. 384x64, six 64x64 cells:
     0  idle    | 1 happy  | 2 hungry
     3 pill-time| 4 sad    | 5 sleeping
     The claim/sprite-generation flow replaces this with a per-pet R2 asset.
     Each cell is a stylized creature face; intentionally simple geometry so
     the placeholder reads as "this is a stand-in" but still feels alive. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 64" width="384" height="64"
  shape-rendering="crispEdges" style="image-rendering: pixelated;">
  <style>
    .body { fill: #d4a574; }
    .body-shade { fill: #b88858; }
    .ear-in { fill: #f4c0a8; }
    .feat { fill: #2a1f17; }
    .blush { fill: #f08a96; opacity: 0.55; }
    .tongue { fill: #ec6b80; }
    .z { fill: #6b8cc8; font-family: monospace; font-size: 8px; font-weight: 700; }
  </style>

  <!-- =================== Cell 0: idle =================== -->
  <g transform="translate(0,0)">
    <!-- Ears -->
    <polygon class="body" points="14,8 18,8 22,18 16,20"/>
    <polygon class="body" points="50,8 46,8 42,18 48,20"/>
    <polygon class="ear-in" points="16,14 18,14 20,18 17,19"/>
    <polygon class="ear-in" points="48,14 46,14 44,18 47,19"/>
    <!-- Head -->
    <rect class="body" x="16" y="16" width="32" height="36" rx="6"/>
    <rect class="body-shade" x="16" y="44" width="32" height="8" rx="4"/>
    <!-- Eyes -->
    <rect class="feat" x="22" y="28" width="4" height="6" rx="1"/>
    <rect class="feat" x="38" y="28" width="4" height="6" rx="1"/>
    <!-- Mouth -->
    <rect class="feat" x="30" y="40" width="4" height="2"/>
    <!-- Cheeks -->
    <circle class="blush" cx="22" cy="40" r="2.5"/>
    <circle class="blush" cx="42" cy="40" r="2.5"/>
  </g>

  <!-- =================== Cell 1: happy =================== -->
  <g transform="translate(64,0)">
    <polygon class="body" points="14,6 18,6 22,16 16,18"/>
    <polygon class="body" points="50,6 46,6 42,16 48,18"/>
    <polygon class="ear-in" points="16,12 18,12 20,16 17,17"/>
    <polygon class="ear-in" points="48,12 46,12 44,16 47,17"/>
    <rect class="body" x="16" y="14" width="32" height="36" rx="6"/>
    <rect class="body-shade" x="16" y="42" width="32" height="8" rx="4"/>
    <!-- Happy eyes: arcs -->
    <path class="feat" d="M22 30 q2 -3 4 0" fill="none" stroke="#2a1f17" stroke-width="2" stroke-linecap="round"/>
    <path class="feat" d="M38 30 q2 -3 4 0" fill="none" stroke="#2a1f17" stroke-width="2" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M27 38 q5 5 10 0" fill="none" stroke="#2a1f17" stroke-width="2" stroke-linecap="round"/>
    <circle class="blush" cx="22" cy="40" r="3"/>
    <circle class="blush" cx="42" cy="40" r="3"/>
  </g>

  <!-- =================== Cell 2: hungry =================== -->
  <g transform="translate(128,0)">
    <polygon class="body" points="14,8 18,8 22,18 16,20"/>
    <polygon class="body" points="50,8 46,8 42,18 48,20"/>
    <polygon class="ear-in" points="16,14 18,14 20,18 17,19"/>
    <polygon class="ear-in" points="48,14 46,14 44,18 47,19"/>
    <rect class="body" x="16" y="16" width="32" height="36" rx="6"/>
    <rect class="body-shade" x="16" y="44" width="32" height="8" rx="4"/>
    <!-- Wide eyes -->
    <circle class="feat" cx="24" cy="30" r="3"/>
    <circle class="feat" cx="40" cy="30" r="3"/>
    <circle fill="#fff" cx="25" cy="29" r="1"/>
    <circle fill="#fff" cx="41" cy="29" r="1"/>
    <!-- Open mouth + tongue -->
    <ellipse class="feat" cx="32" cy="42" rx="4" ry="3"/>
    <ellipse class="tongue" cx="32" cy="44" rx="2.5" ry="1.5"/>
    <!-- Water drop near mouth -->
    <path class="tongue" d="M40 41 q1 2 -1 3 q-1 -1 1 -3 z" opacity="0.7"/>
    <circle class="blush" cx="22" cy="40" r="2.5"/>
    <circle class="blush" cx="42" cy="40" r="2.5"/>
  </g>

  <!-- =================== Cell 3: pill-time =================== -->
  <g transform="translate(192,0)">
    <polygon class="body" points="14,10 18,10 22,20 16,22"/>
    <polygon class="body" points="50,10 46,10 42,20 48,22"/>
    <polygon class="ear-in" points="16,16 18,16 20,20 17,21"/>
    <polygon class="ear-in" points="48,16 46,16 44,20 47,21"/>
    <rect class="body" x="16" y="18" width="32" height="34" rx="6"/>
    <rect class="body-shade" x="16" y="44" width="32" height="8" rx="4"/>
    <!-- Concerned brows above eyes -->
    <rect class="feat" x="21" y="26" width="6" height="1.5" transform="rotate(-12 24 26.75)"/>
    <rect class="feat" x="37" y="26" width="6" height="1.5" transform="rotate(12 40 26.75)"/>
    <!-- Eyes -->
    <rect class="feat" x="22" y="30" width="4" height="5" rx="1"/>
    <rect class="feat" x="38" y="30" width="4" height="5" rx="1"/>
    <!-- Stoic mouth: small flat line -->
    <rect class="feat" x="29" y="42" width="6" height="2" rx="1"/>
    <!-- Tiny pill icon floating beside head -->
    <rect fill="#f5c2c7" x="50" y="34" width="6" height="3" rx="1.5"/>
    <rect fill="#a1d2ce" x="53" y="34" width="3" height="3" rx="1.5"/>
    <circle class="blush" cx="22" cy="40" r="2"/>
    <circle class="blush" cx="42" cy="40" r="2"/>
  </g>

  <!-- =================== Cell 4: sad =================== -->
  <g transform="translate(256,0)">
    <polygon class="body" points="14,12 18,12 22,22 16,24"/>
    <polygon class="body" points="50,12 46,12 42,22 48,24"/>
    <polygon class="ear-in" points="16,18 18,18 20,22 17,23"/>
    <polygon class="ear-in" points="48,18 46,18 44,22 47,23"/>
    <rect class="body" x="16" y="20" width="32" height="32" rx="6"/>
    <rect class="body-shade" x="16" y="44" width="32" height="8" rx="4"/>
    <!-- Droopy eyes -->
    <rect class="feat" x="22" y="30" width="4" height="5" rx="1"/>
    <rect class="feat" x="38" y="30" width="4" height="5" rx="1"/>
    <!-- Tear -->
    <ellipse fill="#7eb9d8" cx="24" cy="38" rx="1.5" ry="2.5" opacity="0.85"/>
    <!-- Frown -->
    <path d="M27 44 q5 -4 10 0" fill="none" stroke="#2a1f17" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- =================== Cell 5: sleeping =================== -->
  <g transform="translate(320,0)">
    <polygon class="body" points="14,10 18,10 22,20 16,22"/>
    <polygon class="body" points="50,10 46,10 42,20 48,22"/>
    <polygon class="ear-in" points="16,16 18,16 20,20 17,21"/>
    <polygon class="ear-in" points="48,16 46,16 44,20 47,21"/>
    <rect class="body" x="16" y="18" width="32" height="34" rx="6"/>
    <rect class="body-shade" x="16" y="44" width="32" height="8" rx="4"/>
    <!-- Closed eyes (horizontal lines) -->
    <rect class="feat" x="20" y="30" width="8" height="2" rx="1"/>
    <rect class="feat" x="36" y="30" width="8" height="2" rx="1"/>
    <!-- Mouth: tiny smile -->
    <path d="M29 42 q3 2 6 0" fill="none" stroke="#2a1f17" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Z particles -->
    <text class="z" x="48" y="20">z</text>
    <text class="z" x="52" y="14" style="font-size:6px;">z</text>
    <circle class="blush" cx="22" cy="40" r="2"/>
    <circle class="blush" cx="42" cy="40" r="2"/>
  </g>
</svg>
