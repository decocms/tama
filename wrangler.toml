name = "myvet"
main = "api/main.cf.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Reminder cron: scans schedule_state every 10 min and pushes notifications
# 10–20 min ahead of each dose anchor. See api/notifications/scheduler.ts.
[triggers]
crons = ["*/10 * * * *"]

# Non-secret config. Secrets (CF_AI_GATEWAY_TOKEN, ANTHROPIC_API_KEY,
# PERPLEXITY_API_KEY, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT)
# go in .dev.vars locally and `wrangler secret put` for prod.
[vars]
AI_GATEWAY_ACCOUNT_ID = "55dd6d847f366735ef6e0f860c7bdc51"
AI_GATEWAY_NAME = "default"

[[d1_databases]]
binding = "DB"
database_name = "myvet"
database_id = "0e2b493f-1f85-4327-bec3-5fa89df1c9e6"
migrations_dir = "api/db/migrations"

[[r2_buckets]]
binding = "FILES"
bucket_name = "myvet-files"
preview_bucket_name = "myvet-files-dev"

# Workers AI — Cloudflare-hosted models (Whisper transcription, etc.).
# Billed against your Cloudflare account's unified billing, no provider key
# required. The AI binding gives us env.AI.run("@cf/openai/whisper-...", …).
[ai]
binding = "AI"

[assets]
directory = "dist/client"
binding = "ASSETS"
